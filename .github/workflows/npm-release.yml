# Publish to npm when a GitHub release is promoted from prerelease to full release.
#
# @hyperyai/sdk is a pure-source package, so this mirrors tishlang's `type: source`
# packages (@tishlang/pg, vite-plugin-tish): check out the release tag, build, and
# publish FROM SOURCE — npm-release makes the artifact itself, no pre-built tarball
# asset. (npm pack in ci.yml still attaches a tarball as a convenience download.)
#
# Idempotent (mirrors tishlang): skip the publish when this exact version is already
# on npm, so re-runs stay green — including the `edited` event fired by the separate
# update-release job when it appends the npm URL. Without this, publishing then
# editing the body re-fires the workflow and the second run dies with "cannot
# publish over the previously published version".
#
# AUTH: npm OIDC trusted publishing (no long-lived NPM_TOKEN — npm revoked classic
# tokens on 2026-12-09 and forces granular tokens to expire, so OIDC is the only
# durable option). ONE-TIME setup on npmjs.com > @hyperyai/sdk > Settings >
# "Trusted Publisher" > GitHub Actions:
#   Organization or user: hyperyai
#   Repository:           hypery-sdk
#   Workflow filename:    npm-release.yml
#   Environment:          (leave blank)
# Requires npm >= 11.5.1 (upgraded below) and the id-token: write permission.

name: NPM release

on:
  release:
    types: [published, edited]

jobs:
  publish:
    name: Publish to npm
    # Only run for a full release (not a prerelease).
    if: github.event.release.prerelease == false
    runs-on: ubuntu-latest
    permissions:
      contents: read   # the release body is updated in the separate update-release job
      id-token: write  # required for npm OIDC trusted publishing
    env:
      # No NODE_AUTH_TOKEN — auth is via OIDC (see trusted-publishing note at top).
      NPM_CONFIG_PROVENANCE: "false"
    steps:
      - name: Checkout the release tag
        uses: actions/checkout@v7
        with:
          ref: refs/tags/${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Upgrade npm for OIDC trusted publishing (needs >= 11.5.1)
        run: |
          npm install -g npm@latest
          npm --version

      - name: Determine version and whether it is already published
        id: check
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if npm view "@hyperyai/sdk@${VERSION}" version >/dev/null 2>&1; then
            echo "already=true" >> "$GITHUB_OUTPUT"
            echo "::notice::@hyperyai/sdk@${VERSION} is already published — skipping."
          else
            echo "already=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.check.outputs.already == 'false'
        run: npm ci

      - name: Build and test
        if: steps.check.outputs.already == 'false'
        run: |
          npm test
          npm run build

      - name: Set the package version from the release tag
        if: steps.check.outputs.already == 'false'
        run: npm version "${{ steps.check.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Publish @hyperyai/sdk to npm (from source)
        if: steps.check.outputs.already == 'false'
        run: npm publish --access public

  update-release:
    name: Update release description
    needs: publish
    # Run after publish (success OR skip), but never for a prerelease.
    if: ${{ always() && github.event.release.prerelease == false }}
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to update the release body via API
    steps:
      - name: Update release description with npm URL (idempotent)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          NPM_URL="https://www.npmjs.com/package/@hyperyai/sdk/v/${VERSION}"
          RELEASE_ID="${{ github.event.release.id }}"
          REPO="${{ github.repository }}"
          CURRENT_BODY=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/${REPO}/releases/${RELEASE_ID}" | jq -r '.body // ""')
          # Idempotent: the PATCH below fires another `edited` event which re-runs this
          # workflow — don't append the npm-URL line a second time.
          if printf '%s' "$CURRENT_BODY" | grep -q "Published to npm:"; then
            echo "Release body already lists the npm URL — nothing to do."
            exit 0
          fi
          NEW_BODY="${CURRENT_BODY}

          ---
          Published to npm: ${NPM_URL}"
          curl -s -X PATCH \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/releases/${RELEASE_ID}" \
            -d "$(printf '%s' "$NEW_BODY" | jq -Rs '{body: .}')"
